version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    ignore:
      # legacy frontend app is static so security issues are irrelevant
      - dependency-name: "*"

  - package-ecosystem: npm
    directory: /frontend-v2
    schedule:
      interval: weekly
    ignore:
      # Pin ESLint to the v9 line: Next.js isn't compatible with ESLint 10 yet.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Don't bump Tailwind to v4+: it requires a manual migration (v3 -> v4).
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    groups:
      all-npm:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /server/src
    schedule:
      interval: weekly
    groups:
      all-gomod:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      all-actions:
        patterns:
          - "*"
