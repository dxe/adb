name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "CODEOWNERS"
      - ".devcontainer/**"
      - ".vscode/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "CODEOWNERS"
      - ".vscode/**"
  workflow_dispatch:

# Restrict GITHUB_TOKEN to the minimum these jobs need rather than inheriting
# the repo/org default scopes. Write scopes are not needed here.
permissions:
  contents: read

jobs:
  # Detect which services a push touched so the deploy jobs below can skip
  # work that didn't change. GitHub's built-in `on.push.paths` filters gate a
  # whole workflow, not individual jobs, so we use dorny/paths-filter to get
  # per-job change detection while still running the test job exactly once.
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      frontend: ${{ steps.filter.outputs.frontend }}
      lambdas: ${{ steps.filter.outputs.lambdas }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history so the push diff has a valid base to compare against.
          fetch-depth: 0
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            # Everything baked into the server image (Dockerfile): the Go API
            # and CLI, the shared pkg module, and the legacy Vue frontend.
            server:
              - 'Dockerfile'
              - 'server/**'
              - 'cli/**'
              - 'pkg/**'
              - 'frontend/**'
              - 'shared/**'
              - 'go.work'
              - 'go.work.sum'
            # Everything baked into the Next.js image (Dockerfile.frontend-v2).
            frontend:
              - 'Dockerfile.frontend-v2'
              - 'frontend-v2/**'
              - 'shared/**'
            # The lambdas are their own Go module; pkg/ is pulled in via a
            # replace directive (GOWORK=off), so both affect the binaries.
            lambdas:
              - 'jobs/**'
              - 'pkg/**'

  # Single shared test + lint run. The image builds run in parallel with this
  # job, but the promote jobs that flip an image to :latest gate on it via
  # `needs: test`, so nothing ships unless this passes.
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        # Keep version in sync with server/compose.yaml
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: server/src/go.mod
      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          # Please keep pnpm version in sync with package.json
          version: 10.32.1
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend-v2/pnpm-lock.yaml
      - name: Version check
        run: |
          node --version
          npm --version
          go version
      - name: Install deps
        run: |
          cd ./frontend
          npm ci --legacy-peer-deps
          cd ../server/src
          go mod download
      - name: Install frontend-v2 deps
        run: cd ./frontend-v2 && pnpm install --frozen-lockfile
      - name: Lint frontend-v2
        run: cd ./frontend-v2 && pnpm lint --max-warnings=0
      - name: Set up database user
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE USER 'adb_user'@'%' IDENTIFIED BY 'adbpassword';"
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "GRANT ALL PRIVILEGES ON *.* TO 'adb_user'@'%';"
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE adb_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
      - name: Set environment variables for tests
        run: echo "DB_PROTOCOL=tcp(127.0.0.1:3306)" >> $GITHUB_ENV
      - name: Run tests
        run: |
          ./.githooks/pre-commit
          cd ./server/src
          go test github.com/dxe/adb/...
      - name: Run full frontend-v2 test suite on manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: cd ./frontend-v2 && pnpm test --run
      - name: Run frontend-v2 tests changed in this pull request or push
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
        run: |
          cd ./frontend-v2

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            since_sha="${{ github.event.pull_request.base.sha }}"
          else
            since_sha="${{ github.event.before }}"

            # Defensive guard: on pushes, GitHub can use the all-zero SHA when there is no usable previous commit to diff
            # against. Since this workflow only runs on pushes to main, that should not normally happen here.
            if [ "$since_sha" = "0000000000000000000000000000000000000000" ]; then
              echo "::warning::github.event.before is the all-zero SHA, so there is no valid commit to diff against. Running the full frontend-v2 test suite instead."
              pnpm test --run
              exit 0
            fi
          fi

          pnpm exec vitest --run --changed "$since_sha" --passWithNoTests

  # Build and push the server image under an immutable :<sha> tag. Runs only on
  # pushes, only when server inputs changed. Deliberately does NOT gate on
  # `test`, so this slow build overlaps the test run. A :<sha> tag triggers no
  # deploy on its own; only promote-server (gated on tests) flips it to :latest.
  build-server:
    needs: [changes]
    if: ${{ github.event_name == 'push' && needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2
      - name: Set up Docker Buildx
        # Required for the gha cache backend below; the default docker driver
        # cannot export a registry/gha build cache.
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build and push image to ECR (main)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/dxe/adb:${{ github.sha }}
          # Distinct scope so the two images don't clobber each other's cache.
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

  # Promote the freshly built server image to :latest once tests pass. This is
  # a registry-side manifest retag (no layer pull/push), so it finishes in
  # seconds — the deploy effectively starts the moment tests go green.
  promote-server:
    needs: [test, build-server, changes]
    if: ${{ github.event_name == 'push' && needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2
      - name: Retag :${{ github.sha }} as :latest
        run: |
          docker buildx imagetools create \
            --tag ${{ steps.login-ecr.outputs.registry }}/dxe/adb:latest \
            ${{ steps.login-ecr.outputs.registry }}/dxe/adb:${{ github.sha }}

  # Build and push the Next.js image under an immutable :<sha> tag, in parallel
  # with `test` (see build-server for the rationale).
  build-frontend:
    needs: [changes]
    if: ${{ github.event_name == 'push' && needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build and push image to ECR (next.js)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile.frontend-v2
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/dxe/adb-next:${{ github.sha }}
          cache-from: type=gha,scope=next
          cache-to: type=gha,scope=next,mode=max

  # Promote the freshly built Next.js image to :latest once tests pass.
  promote-frontend:
    needs: [test, build-frontend, changes]
    if: ${{ github.event_name == 'push' && needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2
      - name: Retag :${{ github.sha }} as :latest
        run: |
          docker buildx imagetools create \
            --tag ${{ steps.login-ecr.outputs.registry }}/dxe/adb-next:latest \
            ${{ steps.login-ecr.outputs.registry }}/dxe/adb-next:${{ github.sha }}

  # Build and deploy the jobs lambdas via SAM. us-west-2 matches jobs/Makefile.
  deploy-lambdas:
    needs: [test, changes]
    if: ${{ github.event_name == 'push' && needs.changes.outputs.lambdas == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: jobs/go.mod
      - name: Set up Python for SAM
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install SAM dependencies
        run: cd ./jobs && make deps
      # Configure credentials only after deps are installed so the untrusted
      # pip packages can't run with AWS credentials present in the environment.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Deploy jobs lambdas
        run: cd ./jobs && make deploy
