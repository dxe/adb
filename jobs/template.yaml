AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: DxE jobs — AWS Lambda jobs

Parameters:
  # SMTP and database secrets are SecureString SSM parameters resolved by the
  # functions at runtime (see internal/secrets), not passed in at deploy time.
  ParamSecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: Security group IDs for the Lambda VPC config.
    Default: sg-063e8c0d777d1e786
  ParamSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs for the Lambda VPC config.
    Default: subnet-06d83dbfc7471e938,subnet-01b09b1d04eb4057b

Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
      - arm64
    VpcConfig:
      SecurityGroupIds: !Ref ParamSecurityGroupIds
      SubnetIds: !Ref ParamSubnetIds

Resources:
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: adb-jobs-hello-world
      Handler: bootstrap
      CodeUri: bin/hello-world.zip
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/smtp_user
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/smtp_pass
            - Effect: Allow
              Action: kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com

  CommunityReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: adb-jobs-community-reports
      Handler: bootstrap
      CodeUri: bin/community-reports.zip
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mysql_lambda_host
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mysql_lambda_user
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mysql_lambda_password
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/smtp_user
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/smtp_pass
            - Effect: Allow
              Action: kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com

