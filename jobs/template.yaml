AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: DxE jobs — AWS Lambda jobs

Parameters:
  SmtpUser:
    Type: String
    NoEcho: true
    Description: SMTP user, passed in from SSM at deploy time.
  SmtpPass:
    Type: String
    NoEcho: true
    Description: SMTP password, passed in from SSM at deploy time.
  DbHost:
    Type: String
    NoEcho: true
    Description: Database host, passed in from the mysql_lambda_host SSM parameter at deploy time.
  DbUser:
    Type: String
    NoEcho: true
    Description: Database user, passed in from the mysql_lambda_user SSM parameter at deploy time.
  DbPassword:
    Type: String
    NoEcho: true
    Description: Database password, passed in from the mysql_lambda_password SSM parameter at deploy time.
  ParamSecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: Security group IDs for the Lambda VPC config.
    Default: sg-063e8c0d777d1e786
  ParamSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs for the Lambda VPC config.
    Default: subnet-06d83dbfc7471e938,subnet-01b09b1d04eb4057b

Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
      - arm64
    VpcConfig:
      SecurityGroupIds: !Ref ParamSecurityGroupIds
      SubnetIds: !Ref ParamSubnetIds
    Environment:
      Variables:
        SMTP_USER: !Ref SmtpUser
        SMTP_PASS: !Ref SmtpPass

Resources:
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jobs-hello-world
      Handler: bootstrap
      CodeUri: bin/hello-world.zip
      Policies:
        - AWSLambdaVPCAccessExecutionRole

  CommunityReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jobs-community-reports
      Handler: bootstrap
      CodeUri: bin/community-reports.zip
      Policies:
        - AWSLambdaVPCAccessExecutionRole
      Environment:
        Variables:
          DB_HOST: !Ref DbHost
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword

# TODO: add CloudWatch alarms
